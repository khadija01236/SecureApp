<ossec_config>

  <!-- ======================================================================
       GLOBAL — Paramètres généraux du manager
  ======================================================================= -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
    <update_check>yes</update_check>
  </global>

  <!-- ======================================================================
       LOGGING
  ======================================================================= -->
  <logging>
    <log_format>plain</log_format>
  </logging>

  <!-- ======================================================================
       ALERTES
  ======================================================================= -->
  <alerts>
    <!-- Niveau minimum pour écrire dans alerts.log -->
    <log_alert_level>3</log_alert_level>
    <!-- Niveau minimum pour envoyer un email (désactivé ici) -->
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!-- ======================================================================
       REMOTE — Réception des agents Wazuh
  ======================================================================= -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- ======================================================================
       COLLECTE DES LOGS — Flask (JSON)
       Chaque événement d'auth produit une ligne JSON dans ce fichier.
       Wazuh parse automatiquement le JSON et expose les champs comme data.*
  ======================================================================= -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/flask/app.log</location>
    <label key="source">flask</label>
  </localfile>

  <!-- ======================================================================
       COLLECTE DES LOGS — Nginx (JSON)
       Chaque requête HTTP produit une ligne JSON (format défini dans nginx.conf)
  ======================================================================= -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/nginx/access.log</location>
    <label key="source">nginx</label>
  </localfile>

  <!-- Logs d'erreur Nginx (format standard) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/error.log</location>
    <label key="source">nginx-error</label>
  </localfile>

  <!-- ======================================================================
       INTEGRITY CHECKING — Surveiller les fichiers de configuration critiques
  ======================================================================= -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Fichiers à surveiller -->
    <directories realtime="yes">/etc/nginx</directories>
    <directories realtime="yes">/var/ossec/etc</directories>

    <!-- Ignorer les fichiers qui changent trop souvent -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
  </syscheck>

  <!-- ======================================================================
       ACTIVE RESPONSE — Définition des commandes disponibles
  ======================================================================= -->

  <!-- firewall-drop : bloque l'IP via iptables (nécessite cap NET_ADMIN sur le conteneur) -->
  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- nginx-block : écrit l'IP dans le fichier de deny list Nginx partagé -->
  <command>
    <name>nginx-block</name>
    <executable>nginx-block.sh</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <!-- ======================================================================
       ACTIVE RESPONSE — Authentification : Brute Force Login
       Règle 100003 — 5+ échecs de connexion en 60s depuis la même IP
       Timeout : 600s (10 min)
  ======================================================================= -->
  <active-response>
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>100003</rules_id>
    <timeout>600</timeout>
  </active-response>

  <active-response>
    <disabled>no</disabled>
    <command>nginx-block</command>
    <location>local</location>
    <rules_id>100003</rules_id>
    <timeout>600</timeout>
  </active-response>

  <!-- ======================================================================
       ACTIVE RESPONSE — Authentification : Tentative de bypass MFA
       Règle 100005 — 3+ échecs MFA en 5 min pour le même utilisateur
       Timeout : 1800s (30 min) — plus long car attaque ciblée
  ======================================================================= -->
  <active-response>
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>100005</rules_id>
    <timeout>1800</timeout>
  </active-response>

  <active-response>
    <disabled>no</disabled>
    <command>nginx-block</command>
    <location>local</location>
    <rules_id>100005</rules_id>
    <timeout>1800</timeout>
  </active-response>

  <!-- ======================================================================
       ACTIVE RESPONSE — Web : Injection SQL détectée
       Règle 100011 — pattern SQLi dans l'URI
       Timeout : 3600s (1h) — attaque grave, blocage long
  ======================================================================= -->
  <active-response>
    <disabled>no</disabled>
    <command>nginx-block</command>
    <location>local</location>
    <rules_id>100011</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <!-- ======================================================================
       ACTIVE RESPONSE — Web : XSS détecté
       Règle 100012 — pattern XSS dans l'URI
       Timeout : 3600s (1h)
  ======================================================================= -->
  <active-response>
    <disabled>no</disabled>
    <command>nginx-block</command>
    <location>local</location>
    <rules_id>100012</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <!-- ======================================================================
       ACTIVE RESPONSE — Web : Path Traversal / LFI
       Règle 100013 — tentative de lecture de fichiers système
       Timeout : 3600s (1h)
  ======================================================================= -->
  <active-response>
    <disabled>no</disabled>
    <command>nginx-block</command>
    <location>local</location>
    <rules_id>100013</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <!-- ======================================================================
       ACTIVE RESPONSE — Web : Scan / énumération (15+ erreurs 404 en 30s)
       Règle 100015
       Timeout : 600s (10 min)
  ======================================================================= -->
  <active-response>
    <disabled>no</disabled>
    <command>nginx-block</command>
    <location>local</location>
    <rules_id>100015</rules_id>
    <timeout>600</timeout>
  </active-response>

  <!-- ======================================================================
       ACTIVE RESPONSE — Web : Brute force HTTP sur /auth/login (50+ req/60s)
       Règle 100016
       Timeout : 1800s (30 min)
  ======================================================================= -->
  <active-response>
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>100016</rules_id>
    <timeout>1800</timeout>
  </active-response>

  <active-response>
    <disabled>no</disabled>
    <command>nginx-block</command>
    <location>local</location>
    <rules_id>100016</rules_id>
    <timeout>1800</timeout>
  </active-response>

  <!-- ======================================================================
       ROOTCHECK
  ======================================================================= -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/shared/rootkit_trojans.txt</rootkit_trojans>
    <skip_nfs>yes</skip_nfs>
  </rootcheck>

  <!-- ======================================================================
       VULNERABILITY DETECTION
  ======================================================================= -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!-- ======================================================================
       INDEXER — Envoi des alertes vers OpenSearch (Wazuh Indexer)
  ======================================================================= -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://wazuh-indexer:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/ssl/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/ssl/filebeat.pem</certificate>
      <key>/etc/ssl/filebeat.key</key>
    </ssl>
  </indexer>

</ossec_config>
