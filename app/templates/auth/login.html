{% extends "base.html" %}
{% block title %}Connexion — SecureApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card mt-5">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-4">
          <i class="bi bi-lock-fill text-primary me-2"></i>Connexion
        </h2>
        <form method="POST" action="{{ url_for('auth.login') }}">
          <div class="mb-3">
            <label for="identifier" class="form-label">Nom d'utilisateur ou email</label>
            <input
              type="text"
              class="form-control"
              id="identifier"
              name="identifier"
              required
              autofocus
              autocomplete="username"
            />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Mot de passe</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              required
              autocomplete="current-password"
            />
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember" name="remember" />
            <label class="form-check-label" for="remember">Se souvenir de moi</label>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
            </button>
          </div>
        </form>
        <hr />
        <p class="text-center mb-1">
          <a href="{{ url_for('auth.forgot_password') }}">
            <i class="bi bi-key me-1"></i>Mot de passe oublié ?
          </a>
        </p>
        <p class="text-center mb-0">
          Pas encore de compte ?
          <a href="{{ url_for('auth.register') }}">S'inscrire</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
