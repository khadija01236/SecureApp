{% extends "base.html" %}
{% block title %}Mot de passe oublié — SecureApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card mt-5">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-1">
          <i class="bi bi-key-fill text-warning me-2"></i>Mot de passe oublié
        </h2>
        <p class="text-center text-muted mb-4">
          Saisis ton adresse email pour recevoir un lien de réinitialisation.
        </p>
        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
          <div class="mb-3">
            <label for="email" class="form-label">Adresse email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              required
              autofocus
              autocomplete="email"
            />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-warning btn-lg">
              <i class="bi bi-envelope-fill me-2"></i>Envoyer le lien
            </button>
          </div>
        </form>
        <hr />
        <p class="text-center mb-0">
          <a href="{{ url_for('auth.login') }}">
            <i class="bi bi-arrow-left me-1"></i>Retour à la connexion
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
