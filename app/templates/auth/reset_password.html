{% extends "base.html" %}
{% block title %}Nouveau mot de passe — SecureApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card mt-5">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-1">
          <i class="bi bi-shield-lock-fill text-success me-2"></i>Nouveau mot de passe
        </h2>
        <p class="text-center text-muted mb-4">Choisis un mot de passe d'au moins 8 caractères.</p>
        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
          <div class="mb-3">
            <label for="password" class="form-label">Nouveau mot de passe</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              required
              autofocus
              autocomplete="new-password"
              minlength="8"
            />
          </div>
          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirmer le mot de passe</label>
            <input
              type="password"
              class="form-control"
              id="confirm_password"
              name="confirm_password"
              required
              autocomplete="new-password"
              minlength="8"
            />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success btn-lg">
              <i class="bi bi-check-circle-fill me-2"></i>Réinitialiser le mot de passe
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
