user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/nginx_error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Format de log JSON (parsé par Wazuh) ─────────────────────────────
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"server_name":"$server_name"'
        '}';

    access_log  /var/log/nginx/nginx_access.log  json_combined;

    sendfile        on;
    keepalive_timeout  65;

    # ── Masquer la version Nginx ──────────────────────────────────────────
    server_tokens off;

    # ── Limiter la taille des requêtes (anti upload massif) ──────────────
    client_max_body_size 2M;

    # ── Rate limiting global (anti scan / DDoS) ──────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/m;
    limit_req_status 429;

    # =========================================================================
    # HTTP → HTTPS redirect
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # Répondre au health-check Docker sans redirect
        location /health {
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS — reverse proxy vers Flask
    # =========================================================================
    server {
        listen 443 ssl;
        server_name localhost;

        # ── TLS ───────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Headers de sécurité ───────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; object-src 'none'; frame-ancestors 'none';"
            always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # ── IPs bloquées par Wazuh active response ───────────────────────
        # Le fichier est écrit par nginx-block.sh (volume nginx_blocked_ips).
        # Il contient des directives `deny IP;` ajoutées dynamiquement.
        # Un SIGHUP est envoyé à Nginx après chaque modification.
        include /etc/nginx/wazuh/blocked_ips.conf;

        # ── Rate limiting sur les endpoints d'auth ────────────────────────
        location ~* ^/auth/(login|register|mfa) {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://web:5000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Proxy général vers Flask ──────────────────────────────────────
        location / {
            limit_req zone=global burst=10 nodelay;
            proxy_pass         http://web:5000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Bloquer les fichiers sensibles ────────────────────────────────
        location ~* \.(env|git|sql|bak|log|conf|ini)$ {
            deny all;
            return 404;
        }

        # ── Page d'erreur personnalisée pour 429 ─────────────────────────
        error_page 429 /429.html;
        location = /429.html {
            return 429 '{"error":"Trop de requêtes. Réessaie dans quelques instants."}';
            add_header Content-Type application/json;
        }
    }
}
